name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm audit --audit-level=high

  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run --coverage

  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsecret-1-dev
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  # Phase E (autonomous heartbeat) Python service. Lives at heartbeat/.
  # Lints + tests on every push so the on-VM service stays green alongside
  # the Tauri app.
  test-heartbeat:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: heartbeat
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: heartbeat/pyproject.toml
      - name: Install heartbeat package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Type-check (mypy)
        run: mypy src
      - name: Test (pytest)
        run: pytest -ra

  build:
    needs: [lint-and-typecheck, test-js, test-rust, test-heartbeat]
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsecret-1-dev
      - name: Verify signing secrets on tag push
        # Run on every matrix OS so a Linux job with missing secrets does not
        # silently pass while macOS fails — fail fast across the board.
        if: github.ref_type == 'tag'
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=()
          [ -z "$TAURI_SIGNING_PRIVATE_KEY" ] && missing+=("TAURI_SIGNING_PRIVATE_KEY")
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD may be intentionally empty
          # (if the key has no password) but the secret itself must be
          # defined so Tauri knows to pass an empty string rather than
          # prompt interactively. Check presence in env, not emptiness.
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD+set}" ]; then
            missing+=("TAURI_SIGNING_PRIVATE_KEY_PASSWORD (set as empty string if key has no password)")
          fi
          # Apple secrets are only checked on macOS — other OSes don't
          # sign or notarize, so missing them there is not an error.
          if [ "${{ runner.os }}" = "macOS" ]; then
            [ -z "$APPLE_SIGNING_IDENTITY" ] && missing+=("APPLE_SIGNING_IDENTITY")
            [ -z "$APPLE_ID" ]               && missing+=("APPLE_ID")
            [ -z "$APPLE_TEAM_ID" ]          && missing+=("APPLE_TEAM_ID")
          fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Release tag push missing required secrets: ${missing[*]}"
            echo "::error::Configure these in repo Settings -> Secrets and variables -> Actions before tagging a release."
            exit 1
          fi
          echo "All release signing secrets present for ${{ runner.os }}."
      - name: Reject placeholder updater pubkey on tag push
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          if grep -q 'GENERATED_PUBLIC_KEY_HERE' src-tauri/tauri.conf.json; then
            echo "::error::tauri.conf.json still contains GENERATED_PUBLIC_KEY_HERE placeholder."
            echo "::error::Generate a real keypair with 'npx tauri signer generate' and update the pubkey before tagging."
            exit 1
          fi
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: ${{ github.ref_type == 'tag' && format('IKAROS Workspace {0}', github.ref_name) || '' }}
          releaseBody: ${{ github.ref_type == 'tag' && 'See changelog for details.' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Firebase CI placeholders
          VITE_FIREBASE_API_KEY: "ci-placeholder"
          VITE_FIREBASE_AUTH_DOMAIN: "ci.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "ci-project"
          VITE_FIREBASE_STORAGE_BUCKET: "ci.appspot.com"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000"
          VITE_FIREBASE_APP_ID: "1:000:web:000"
          # macOS code signing (skipped gracefully when secrets not set)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # macOS notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Tauri updater signing (required for auto-update)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ikrs-workspace-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore
