name: Smoke Test

# Clean-machine install + launch verification per Phase 4c §6.
# Runs on a fresh macos-latest runner so we prove the build can be
# opened from a standing start without any local dev state.
#
# Gates v* tag releases: the `build` workflow calls this indirectly by
# requiring its unsigned DMG artefact, which this workflow downloads
# and installs.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  smoke:
    name: Install + launch (macOS)
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned release bundle
        env:
          # Firebase placeholders for CI build
          VITE_FIREBASE_API_KEY: "ci-placeholder"
          VITE_FIREBASE_AUTH_DOMAIN: "ci.firebaseapp.com"
          VITE_FIREBASE_PROJECT_ID: "ci-project"
          VITE_FIREBASE_STORAGE_BUCKET: "ci.appspot.com"
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000"
          VITE_FIREBASE_APP_ID: "1:000:web:000"
        run: npx tauri build --bundles dmg

      - name: Locate DMG
        id: locate
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -n 1)
          if [ -z "$DMG" ]; then
            echo "::error::No DMG produced by tauri build"
            ls -la src-tauri/target/release/bundle/ || true
            exit 1
          fi
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"
          echo "Found DMG at: $DMG"

      - name: Attach DMG
        run: |
          hdiutil attach "${{ steps.locate.outputs.dmg }}" -mountpoint /Volumes/ikrs-smoke -nobrowse -noverify -noautoopen

      - name: Copy app to /Applications
        run: |
          APP_IN_DMG=$(find /Volumes/ikrs-smoke -maxdepth 2 -name "*.app" | head -n 1)
          if [ -z "$APP_IN_DMG" ]; then
            echo "::error::No .app found inside mounted DMG"
            ls -la /Volumes/ikrs-smoke/
            exit 1
          fi
          sudo cp -R "$APP_IN_DMG" /Applications/
          echo "Installed: /Applications/$(basename "$APP_IN_DMG")"

      - name: Ad-hoc re-sign for Gatekeeper tolerance
        # Unsigned apps downloaded from the internet on CI runners still
        # have quarantine. An ad-hoc re-sign + xattr strip makes the
        # app launchable in headless mode for this smoke test. In
        # production the DMG will be real-signed and this step becomes
        # a no-op.
        run: |
          APP=$(find /Applications -maxdepth 1 -name "IKAROS Workspace.app" | head -n 1)
          sudo codesign --force --deep --sign - "$APP"
          sudo xattr -dr com.apple.quarantine "$APP" || true

      - name: Launch app headless
        run: |
          APP=$(find /Applications -maxdepth 1 -name "IKAROS Workspace.app" | head -n 1)
          open -a "$APP" --hide
          # Give the app 10 seconds to start + not crash.
          sleep 10

      - name: Assert app still running
        run: |
          if pgrep -f "IKAROS Workspace" > /dev/null; then
            echo "App is running. Smoke pass."
          else
            echo "::error::App exited within 10s of launch."
            # Capture any crash report produced
            ls -la ~/Library/Logs/DiagnosticReports/ 2>/dev/null || true
            find ~/Library/Logs/DiagnosticReports -type f -mmin -5 -exec head -50 {} \; 2>/dev/null || true
            exit 1
          fi

      - name: Assert no crash reports
        run: |
          RECENT=$(find ~/Library/Logs/DiagnosticReports -type f -mmin -5 2>/dev/null | grep -i "IKAROS" || true)
          if [ -n "$RECENT" ]; then
            echo "::error::Crash report produced during smoke test:"
            echo "$RECENT"
            for f in $RECENT; do
              echo "--- $f ---"
              head -80 "$f"
            done
            exit 1
          fi

      - name: Shut down app
        if: always()
        run: |
          osascript -e 'quit app "IKAROS Workspace"' 2>/dev/null || true
          sleep 2
          pkill -f "IKAROS Workspace" 2>/dev/null || true

      - name: Detach DMG
        if: always()
        run: |
          hdiutil detach /Volumes/ikrs-smoke -force 2>/dev/null || true
